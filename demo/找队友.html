<!DOCTYPE html>

<html class="light" lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "surface-tint": "#005db6",
                    "surface-bright": "#f7f9fc",
                    "inverse-surface": "#2d3133",
                    "tertiary-fixed": "#ffdcc2",
                    "on-primary-container": "#fefcff",
                    "outline": "#717784",
                    "error-container": "#ffdad6",
                    "surface-container-low": "#f2f4f7",
                    "surface-dim": "#d8dadd",
                    "surface-container-lowest": "#ffffff",
                    "outline-variant": "#c1c6d5",
                    "on-primary-fixed": "#001b3d",
                    "on-secondary-container": "#007257",
                    "tertiary-fixed-dim": "#ffb77b",
                    "on-error-container": "#93000a",
                    "inverse-on-surface": "#eff1f4",
                    "on-primary": "#ffffff",
                    "on-error": "#ffffff",
                    "on-surface": "#191c1e",
                    "secondary-container": "#6bfbcb",
                    "error": "#ba1a1a",
                    "secondary": "#006c52",
                    "on-tertiary-container": "#fffbff",
                    "surface": "#f7f9fc",
                    "surface-container": "#eceef1",
                    "surface-container-high": "#e6e8eb",
                    "on-tertiary": "#ffffff",
                    "on-secondary": "#ffffff",
                    "primary": "#005bb2",
                    "on-secondary-fixed-variant": "#00513d",
                    "surface-variant": "#e0e3e6",
                    "secondary-fixed": "#6bfbcb",
                    "secondary-fixed-dim": "#49deb0",
                    "primary-container": "#1173db",
                    "primary-fixed-dim": "#a9c7ff",
                    "on-background": "#191c1e",
                    "on-surface-variant": "#414753",
                    "inverse-primary": "#a9c7ff",
                    "tertiary": "#8c4c00",
                    "tertiary-container": "#b06000",
                    "on-primary-fixed-variant": "#00468b",
                    "on-tertiary-fixed-variant": "#6d3a00",
                    "background": "#f7f9fc",
                    "primary-fixed": "#d6e3ff",
                    "surface-container-highest": "#e0e3e6",
                    "on-tertiary-fixed": "#2e1500",
                    "on-secondary-fixed": "#002117"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Plus Jakarta Sans"],
                    "body": ["Inter"],
                    "label": ["Inter"]
            }
          },
        },
      }
    </script>
<style>
        body { font-family: 'Inter', sans-serif; }
        h1, h2, h3 { font-family: 'Plus Jakarta Sans', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }
        .bg-primary-gradient {
            background: linear-gradient(135deg, #005bb2 0%, #1173db 100%);
        }
        .glass-panel {
            background: rgba(247, 249, 252, 0.8);
            backdrop-filter: blur(20px);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-surface text-on-surface min-h-screen pb-32">
<!-- Top Navigation Bar -->
<header class="fixed top-0 w-full z-50 bg-slate-50/80 dark:bg-slate-900/80 backdrop-blur-xl flex items-center justify-between px-6 py-4 w-full">
<div class="flex items-center gap-4">
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-slate-200/50 transition-colors active:scale-95 duration-150">
<span class="material-symbols-outlined text-slate-500">arrow_back</span>
</button>
<h1 class="font-['Plus_Jakarta_Sans'] font-bold text-lg tracking-tight text-blue-600">发布需求</h1>
</div>
<div class="flex items-center gap-2">
<button class="material-symbols-outlined p-2 text-slate-500 hover:bg-slate-200/50 rounded-full transition-colors">help_outline</button>
</div>
</header>
<main class="pt-24 px-6 max-w-2xl mx-auto">
<!-- Tab Switcher -->
<div class="flex p-1 bg-surface-container-high rounded-full mb-8">
<button class="flex-1 py-3 px-6 rounded-full text-sm font-bold transition-all bg-white shadow-sm text-primary">
                招队友
            </button>
<button class="flex-1 py-3 px-6 rounded-full text-sm font-bold transition-all text-outline hover:text-on-surface-variant">
                求组队
            </button>
</div>
<!-- Form Content -->
<div class="space-y-8">
<!-- Cover Upload Placeholder -->
<section>
<div class="group relative overflow-hidden rounded-xl aspect-[16/6] bg-surface-container-high flex flex-col items-center justify-center border-2 border-dashed border-outline-variant/30 hover:border-primary/50 transition-colors cursor-pointer">
<img class="absolute inset-0 w-full h-full object-cover opacity-20 grayscale transition-all group-hover:scale-105" data-alt="minimalistic abstract background with soft blue gradients and geometric shapes representing academic collaboration" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDEe1ntZSQpmpB7Ovvmd6Bby9janvz2OA86tred-ysGB6Y3of0pAfqKWjkkEvfh0VLKU6viVAjqEw1ENI1g_jAwP_91Z42q_9TDDdivaCcjaFVIzYdLoOuOCJKNCPEA9EqDmXtZZqJgqmdbapB0O9qvBV4V3RT4Y3_pdAXDkPoTP6A10RH5qOehUcp41ijUs7C42bfrGVR_MSJV_TEm8KNNgsvY2CZwLSY3axx0LWbu3ymrr9CyHwn4xWEoeU3hMNpz9XyDSQ36Qwk"/>
<div class="relative z-10 flex flex-col items-center gap-2">
<span class="material-symbols-outlined text-primary text-4xl">add_photo_alternate</span>
<span class="text-sm font-semibold text-outline">上传赛事封面 / 背景</span>
</div>
</div>
</section>
<!-- Competition Name -->
<div class="space-y-2">
<label class="text-xs font-bold uppercase tracking-widest text-outline ml-1">赛事名称</label>
<input class="w-full px-5 py-4 bg-surface-container-lowest rounded-xl border-none ring-1 ring-outline-variant/20 focus:ring-2 focus:ring-primary/50 text-on-surface placeholder:text-outline/50 transition-all" placeholder="例如：2024 全国大学生数学建模竞赛" type="text"/>
</div>
<!-- Intro Textarea -->
<div class="space-y-2">
<label class="text-xs font-bold uppercase tracking-widest text-outline ml-1">项目简介 &amp; 招募要求</label>
<textarea class="w-full px-5 py-4 bg-surface-container-lowest rounded-xl border-none ring-1 ring-outline-variant/20 focus:ring-2 focus:ring-primary/50 text-on-surface placeholder:text-outline/50 transition-all resize-none" placeholder="请简要介绍项目背景，以及你对队友的具体期待（专业、技术栈、沟通习惯等）..." rows="5"></textarea>
</div>
<!-- Skill Tags Selector -->
<div class="space-y-4">
<div class="flex items-center justify-between">
<label class="text-xs font-bold uppercase tracking-widest text-outline ml-1">技能标签</label>
<span class="text-[10px] text-outline font-medium">最多选择 5 个</span>
</div>
<div class="flex flex-wrap gap-2">
<button class="px-4 py-2 bg-secondary-container text-on-secondary-container text-xs font-bold rounded-sm flex items-center gap-1">
                        UI/UX 设计 <span class="material-symbols-outlined text-sm">close</span>
</button>
<button class="px-4 py-2 bg-secondary-container text-on-secondary-container text-xs font-bold rounded-sm flex items-center gap-1">
                        Python <span class="material-symbols-outlined text-sm">close</span>
</button>
<button class="px-4 py-2 bg-surface-container-high text-outline text-xs font-bold rounded-sm hover:bg-surface-container-highest transition-colors">
                        + 添加技能
                    </button>
</div>
</div>
<!-- Deadline Picker -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
<div class="space-y-2">
<label class="text-xs font-bold uppercase tracking-widest text-outline ml-1">招募截止日期</label>
<div class="relative">
<input class="w-full px-5 py-4 bg-surface-container-lowest rounded-xl border-none ring-1 ring-outline-variant/20 focus:ring-2 focus:ring-primary/50 text-on-surface transition-all" type="date"/>
</div>
</div>
<div class="space-y-2">
<label class="text-xs font-bold uppercase tracking-widest text-outline ml-1">缺口人数</label>
<select class="w-full px-5 py-4 bg-surface-container-lowest rounded-xl border-none ring-1 ring-outline-variant/20 focus:ring-2 focus:ring-primary/50 text-on-surface transition-all">
<option>1 人</option>
<option>2 人</option>
<option>3 人</option>
<option>更多</option>
</select>
</div>
</div>
<!-- Additional Options -->
<div class="p-4 bg-surface-container-low rounded-xl flex items-center justify-between">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-secondary">verified_user</span>
<div>
<p class="text-sm font-bold text-on-surface">仅限实名学生申请</p>
<p class="text-[11px] text-outline">开启后，非本校或未认证用户不可投递简历</p>
</div>
</div>
<div class="relative inline-flex items-center cursor-pointer">
<div class="w-11 h-6 bg-primary rounded-full"></div>
<div class="absolute left-6 top-1 w-4 h-4 bg-white rounded-full"></div>
</div>
</div>
<!-- Action Button -->
<div class="pt-4">
<button class="w-full py-5 bg-primary-gradient text-white font-bold rounded-full text-lg shadow-[0_8px_24px_rgba(0,91,178,0.2)] hover:scale-[1.02] active:scale-[0.98] transition-all">
                    发布招募需求
                </button>
<p class="mt-4 text-center text-[11px] text-outline px-8">
                    发布即代表您同意 <span class="text-primary font-semibold">《学术脉搏社区准则》</span> 并承诺发布信息的真实有效性。
                </p>
</div>
</div>
</main>
<!-- Bottom Navigation Bar (Hidden on Focused Task screens like Publish, but included per generic shell rules if not suppressed) -->
<!-- Suppression Logic: Since this is a task-focused screen ("Publish"), we follow the "Task-Focused" rule to suppress main nav to prioritize the canvas, but we show a minimal version if required by the blueprint. Here we prioritize the publish flow. -->
<nav class="fixed bottom-0 w-full z-50 bg-white/80 dark:bg-slate-950/80 backdrop-blur-xl border-t border-slate-100 dark:border-slate-800 shadow-[0_-4px_24px_rgba(0,91,178,0.08)] flex justify-around items-center h-16 w-full px-4 md:hidden">
<div class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 grayscale">
<span class="material-symbols-outlined">home</span>
<span class="font-['Inter'] text-[10px] font-semibold uppercase tracking-widest mt-1">首页</span>
</div>
<div class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 grayscale">
<span class="material-symbols-outlined">explore</span>
<span class="font-['Inter'] text-[10px] font-semibold uppercase tracking-widest mt-1">广场</span>
</div>
<!-- Active indicator would normally be here, but we are in a focused sub-task -->
<div class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 grayscale">
<span class="material-symbols-outlined">chat_bubble</span>
<span class="font-['Inter'] text-[10px] font-semibold uppercase tracking-widest mt-1">消息</span>
</div>
<div class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 grayscale">
<span class="material-symbols-outlined">person</span>
<span class="font-['Inter'] text-[10px] font-semibold uppercase tracking-widest mt-1">我的</span>
</div>
</nav>
</body></html>
