<!DOCTYPE html>

                        "DEFAULT": "0.25rem",

                    "fontFamily": {
                        "headline": ["Plus Jakarta Sans"],
                        "body": ["Inter"],
                        "label": ["Inter"]

<style>
        body { font-family: 'Inter', sans-serif; }
        .font-headline { font-family: 'Plus Jakarta Sans', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .bubble-left::after {
            content: '';
            position: absolute;
            left: -8px;
            top: 14px;
            border-width: 4px 8px 4px 0;
            border-style: solid;
            border-color: transparent #f2f4f7 transparent transparent;
        }
        .bubble-right::after {
            content: '';
            position: absolute;
            right: -8px;
            top: 14px;
            border-width: 4px 0 4px 8px;
            border-style: solid;
            border-color: transparent transparent transparent #1173db;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-background text-on-surface min-h-screen flex flex-col">
<!-- TopAppBar (Mapped from Shared Components JSON) -->
<header class="fixed top-0 w-full z-50 bg-[#f7f9fc] dark:bg-slate-950 flex justify-between items-center px-4 h-16 w-full">
<div class="flex items-center gap-3">
<button class="text-[#3F8EF7] dark:text-blue-400 active:scale-95 transition-transform">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<div class="flex flex-col">
<h1 class="text-[#191c1e] dark:text-slate-100 font-headline font-bold text-lg leading-tight">李明华 (AI Lab)</h1>
<span class="text-[10px] text-outline font-medium tracking-wider flex items-center gap-1">
<span class="w-1.5 h-1.5 rounded-full bg-secondary shadow-[0_0_4px_#006c52]"></span>
                    在线
                </span>
</div>
</div>
<button class="text-[#3F8EF7] dark:text-blue-400 active:scale-95 transition-transform">
<span class="material-symbols-outlined">more_horiz</span>
</button>
</header>
<!-- Main Chat Canvas -->
<main class="flex-1 mt-16 px-4 py-6 overflow-y-auto flex flex-col gap-6 mb-24">
<!-- Timestamp -->
<div class="flex justify-center">
<span class="bg-surface-container-high px-3 py-1 rounded-full text-[10px] font-semibold text-outline tracking-widest">14:20</span>
</div>
<!-- Left Message (Li) -->
<div class="flex items-start gap-3 max-w-[85%]">
<div class="w-10 h-10 rounded-xl overflow-hidden flex-shrink-0 bg-surface-container-highest">
<img class="w-full h-full object-cover" data-alt="Portrait of a young male Asian academic student with glasses, soft library lighting, professional and friendly expression" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAaMtYlCg1q08C4NRWFGzwHoHQ6EHNhU6DwYY1Jb_Tu0SH8f4aAE9bJCPIy7ei77YsrfFamHp1wRjQ1jqqJrtVb0KwdeeQ4KM8dGry3kLhEBqvnyvhdsbJhZKbTfhAEtnZaS_N4PyHzfCIp_GA54rXg8zL5nDP0zfPKYFwVBUmW1TX_tssHKu71eRm3DuaPcIbU3U7ObD8fmqYgH2QBDpeOp5pzXVj4aFF1YVGi8RnD87199_Lb7DMkEXc7h0nLGaTEYGwidCUUYek"/>
</div>
<div class="relative bg-surface-container-low p-3 rounded-xl rounded-tl-none bubble-left">
<p class="text-on-surface text-sm leading-relaxed font-medium">关于这次的数学建模比赛，我有一些关于算法优化的想法，我们要不要线下讨论一下？</p>
</div>
</div>
<!-- Right Message (User) -->
<div class="flex items-start gap-3 max-w-[85%] self-end flex-row-reverse">
<div class="w-10 h-10 rounded-xl overflow-hidden flex-shrink-0 bg-primary-container">
<img class="w-full h-full object-cover" data-alt="Modern minimalist avatar icon representing a professional user, clean background, high key lighting" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDD3Ps8AhRuEUO5tDzVJ0Pormm29Q9JBx5hEl6zdmrp8n9PXYlJFYpz8Cust-fH4f84dtakGubA3QBh-nSWq9eDZ_50UFpgUR0YM6zdNNtEYdCycV3nW_BfgKYjgB69SiGMPQpQ8c4MuJ0hmOFFDq42VOkyeYJ1budeohnbcuZnwVYcJZ68H4xMiSzdIkJjn2tiaJRL7-Ccr81utyMKawVo3V7vjQbxBU1xUG_nMiPzdxiULTJ3G0Ag-HWG9Wxn1R-YHqPoFRVSQI8"/>
</div>
<div class="relative bg-primary-container p-3 rounded-xl rounded-tr-none bubble-right">
<p class="text-on-primary-container text-sm leading-relaxed font-medium">好的，没问题。你明天下午有空吗？</p>
</div>
</div>
<!-- Left Message (Li) -->
<div class="flex items-start gap-3 max-w-[85%]">
<div class="w-10 h-10 rounded-xl overflow-hidden flex-shrink-0 bg-surface-container-highest">
<img class="w-full h-full object-cover" data-alt="Portrait of a young male Asian academic student with glasses, soft library lighting, professional and friendly expression" src="https://lh3.googleusercontent.com/aida-public/AB6AXuC9p5RjfHPQbNWGuEBEB23ASmzl6xbABtUKg3B_coB0QmzJpXzh67trYQma5-D2tDWvjb3yFXIGeW9CDHjeiePOtSAXH8hbEDwhyql5tXWhpr71XpXU-jnmue_nrYwmfNZV5Qd1QKSKuajWXkrAnaUyVNTNRuboPMD_bT-4oI9Vn5Z1iqYGLLvHEDJHAW0TWnDE6KXtkee-_iu_aQ8fP7wb2NU4H3UOrLA019F_vtvd3yO9DABBYJuFTY4cl6k2vOtFsvfavBer9MI"/>
</div>
<div class="relative bg-surface-container-low p-3 rounded-xl rounded-tl-none bubble-left">
<p class="text-on-surface text-sm leading-relaxed font-medium">下午两点可以在图书馆五楼的研讨间见面。</p>
</div>
</div>
<!-- Contextual Asymmetric Card: Meeting Suggestion -->
<div class="mt-2 self-center w-full max-w-xs">
<div class="bg-surface-container-lowest rounded-xl p-4 shadow-[0_8px_24px_rgba(63,142,247,0.06)] border border-outline-variant/10 overflow-hidden relative">
<div class="absolute top-0 right-0 w-24 h-24 bg-primary/5 rounded-full -mr-8 -mt-8"></div>
<div class="flex items-center gap-3 mb-3">
<div class="w-8 h-8 rounded-lg bg-secondary-container flex items-center justify-center">
<span class="material-symbols-outlined text-on-secondary-container text-sm">calendar_today</span>
</div>
<div>
<p class="text-xs font-bold text-on-surface">会议邀约</p>
<p class="text-[10px] text-outline">明天 14:00</p>
</div>
</div>
<div class="bg-surface-container-low rounded-lg p-2 mb-3">
<p class="text-[11px] text-on-surface-variant flex items-center gap-1">
<span class="material-symbols-outlined text-[14px]">location_on</span>
                        中心图书馆五楼 502
                    </p>
</div>
<button class="w-full py-2 rounded-full bg-gradient-to-r from-primary to-primary-container text-white text-[11px] font-bold active:scale-95 transition-all">
                    添加到日程
                </button>
</div>
</div>
</main>
<!-- BottomNavBar (Execution from Shared Components JSON + Design System Inputs) -->
<footer class="fixed bottom-0 w-full z-50 bg-[#ffffff] dark:bg-slate-900 rounded-t-3xl shadow-[0_-8px_24px_rgba(63,142,247,0.08)] flex justify-around items-center px-2 py-3 pb-safe">
<button class="flex flex-col items-center gap-1 text-outline">
<span class="material-symbols-outlined text-2xl">home</span>
<span class="text-[10px] font-bold">首页</span>
</button>
<button class="flex flex-col items-center gap-1 text-outline">
<span class="material-symbols-outlined text-2xl">explore</span>
<span class="text-[10px] font-bold">广场</span>
</button>
<button class="flex flex-col items-center gap-1 text-primary">
<span class="material-symbols-outlined text-2xl" style="font-variation-settings: 'FILL' 1;">chat_bubble</span>
<span class="text-[10px] font-bold">消息</span>
</button>
<button class="flex flex-col items-center gap-1 text-outline">
<span class="material-symbols-outlined text-2xl">person</span>
<span class="text-[10px] font-bold">我的</span>
</button>
</footer>
<!-- Overlay for focused UI feel -->
<div class="fixed inset-0 pointer-events-none border-[12px] border-background/20 rounded-[40px] z-[60]"></div>
</body></html>
